name: CI

on:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile and test
        run: ./gradlew compileKotlinLinuxX64 allTests

  build-and-verify:
    name: Build & Verify (${{ matrix.os }})
    needs: compile-check
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macosArm64
            taskName: MacosArm64
          - os: ubuntu-latest
            target: linuxX64
            taskName: LinuxX64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build native binary
        run: ./gradlew linkReleaseExecutable${{ matrix.taskName }}

      - name: Assemble distribution
        run: ./gradlew assembleDist

      - name: Verify CLI
        run: ./bin/verify
