name: Release

on:
  push:
    tags: [ 'v*' ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile and test
        run: ./gradlew compileKotlinLinuxX64 allTests

  build:
    name: Build (${{ matrix.target }})
    needs: test
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macosArm64
            taskName: MacosArm64
            archiveName: kmp-cli-darwin-arm64
          - os: ubuntu-latest
            target: linuxX64
            taskName: LinuxX64
            archiveName: kmp-cli-linux-amd64
          - os: ubuntu-24.04-arm
            target: linuxArm64
            taskName: LinuxArm64
            archiveName: kmp-cli-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build native binary
        run: ./gradlew assembleDist -PcliVersion=${GITHUB_REF_NAME#v}

      - name: Package archive
        run: tar -czf ${{ matrix.archiveName }}.tar.gz -C kmp-cli/build/dist .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archiveName }}
          path: ${{ matrix.archiveName }}.tar.gz
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum *.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt

  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    needs: release
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            archiveName: kmp-cli-darwin-arm64
          - os: ubuntu-latest
            archiveName: kmp-cli-linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download release archive
        run: |
          curl -fsSL "https://github.com/felipejoglar/kmp-cli/releases/download/${GITHUB_REF_NAME}/${{ matrix.archiveName }}.tar.gz" -o archive.tar.gz

      - name: Verify checksum
        run: |
          curl -fsSL "https://github.com/felipejoglar/kmp-cli/releases/download/${GITHUB_REF_NAME}/checksums.txt" -o checksums.txt
          grep "${{ matrix.archiveName }}.tar.gz" checksums.txt | sha256sum -c

      - name: Extract and verify
        run: |
          mkdir -p dist
          tar -xzf archive.tar.gz -C dist
          chmod +x dist/bin/kmp-cli.kexe
          dist/bin/kmp-cli.kexe --version
